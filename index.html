<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>请假理由生成器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f14;
      --bg-card: #1a1a24;
      --bg-card-hover: #22222e;
      --text: #e8e8ed;
      --text-secondary: #9898a8;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.25);
      --success: #34d399;
      --warning: #fbbf24;
      --border: #2a2a38;
      --tab-active: #7c5cfc;
      --tab-bg: #1a1a24;
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 16px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(124, 92, 252, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(52, 211, 153, 0.04) 0%, transparent 60%);
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-top: 24px;
      padding-bottom: 40px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 8px 0;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #c4b5fd, #7c5cfc, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
      font-weight: 400;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 4px;
      gap: 4px;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 11px 8px;
      text-align: center;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
      position: relative;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--tab-active);
      color: #fff;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .tab-badge {
      display: inline-block;
      font-size: 11px;
      background: rgba(255,255,255,0.15);
      padding: 1px 7px;
      border-radius: 20px;
      margin-left: 4px;
      font-weight: 500;
    }
    .tab.active .tab-badge {
      background: rgba(255,255,255,0.25);
    }

    /* Card */
    .card-wrapper {
      perspective: 1000px;
      min-height: 280px;
    }
    .card {
      position: relative;
      width: 100%;
      min-height: 280px;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: var(--radius);
    }
    .card.flip {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      backface-visibility: hidden;
      border-radius: var(--radius);
      padding: 28px 24px;
    }
    .card-front {
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 280px;
    }
    .card-back {
      background: var(--bg-card);
      border: 1px solid var(--border);
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 280px;
    }

    /* Placeholder */
    .placeholder-icon {
      font-size: 64px;
      opacity: 0.5;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .placeholder-text {
      color: var(--text-secondary);
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
    }

    /* Excuse content */
    .excuse-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .excuse-category-tag {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(124, 92, 252, 0.15);
      color: #a78bfa;
    }
    .excuse-score {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .excuse-score .star {
      font-size: 16px;
      color: #fbbf24;
      transition: all 0.3s ease;
    }
    .excuse-score .star.empty {
      color: #3a3a48;
    }
    .excuse-score-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-left: 4px;
    }
    .excuse-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text);
    }
    .excuse-detail {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      border-left: 3px solid var(--accent);
    }

    /* Action Buttons */
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1;
      min-width: 120px;
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-primary:hover {
      background: #8b6ffc;
      box-shadow: 0 6px 28px var(--accent-glow);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--bg-card-hover);
      border-color: #4a4a5a;
    }

    .btn-success {
      background: rgba(52, 211, 153, 0.12);
      color: var(--success);
      border: 1px solid rgba(52, 211, 153, 0.3);
    }
    .btn-success:hover {
      background: rgba(52, 211, 153, 0.2);
    }
    .btn-success.copied {
      background: rgba(52, 211, 153, 0.25);
      animation: pulse 0.5s ease;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Regenerate btn */
    .regenerate-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: -8px;
      opacity: 0.6;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.4;
      padding-top: 8px;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .header h1 { font-size: 24px; }
      .tab { font-size: 13px; padding: 10px 6px; }
      .card-front, .card-back { padding: 22px 18px; }
      .excuse-title { font-size: 18px; }
      .btn { padding: 12px 16px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>📝 请假理由生成器</h1>
      <p class="subtitle">找不到请假理由？让 AI 帮你（虽然没联网）</p>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabs">
      <button class="tab active" data-category="serious">
        正经理由 <span class="tab-badge">13</span>
      </button>
      <button class="tab" data-category="absurd">
        离谱理由 <span class="tab-badge">12</span>
      </button>
      <button class="tab" data-category="touching">
        感人理由 <span class="tab-badge">13</span>
      </button>
    </div>

    <!-- Card -->
    <div class="card-wrapper">
      <div class="card" id="card">
        <div class="card-front" id="cardFront">
          <div class="placeholder-icon">🎯</div>
          <p class="placeholder-text">
            选个分类，<br>然后点击下方按钮<br>生成一条完美请假理由
          </p>
        </div>
        <div class="card-back" id="cardBack">
          <div class="excuse-meta">
            <span class="excuse-category-tag" id="excuseTag">正经</span>
            <span class="excuse-score" id="excuseScore"></span>
            <span class="excuse-score-label" id="excuseScoreLabel"></span>
          </div>
          <div class="excuse-title" id="excuseTitle"></div>
          <div class="excuse-detail" id="excuseDetail"></div>
        </div>
      </div>
    </div>

    <!-- Generate button -->
    <button class="btn btn-primary" id="btnGenerate" onclick="generate()">
      ✨ 生成请假理由
    </button>

    <!-- Action buttons (hidden initially) -->
    <div class="actions" id="actions" style="display: none;">
      <button class="btn btn-success" id="btnCopy" onclick="copyExcuse()">
        📋 复制理由
      </button>
      <button class="btn btn-primary" id="btnRegenerate" onclick="generate()">
        🔄 换一条
      </button>
    </div>
    <p class="regenerate-hint" id="shareHint" style="display: none;">
      复制后直接粘贴发给领导就好
    </p>

    <!-- Footer -->
    <div class="footer">
      仅供娱乐，请勿当真使用 😉
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ──────────────────────────────────────
    // DATA: 请假理由库
    // ──────────────────────────────────────
    const excuses = {
      serious: [
        {
          title: "身体不适，需要去医院做个检查",
          detail: "昨晚一直低烧不退，吃了退烧药早上还是38度，想去医院抽血检查一下，怕是什么病毒性感冒。大概需要半天时间，下午看情况如果能坚持就回来上班。",
          score: 5
        },
        {
          title: "家里水管爆了需要紧急处理",
          detail: "刚接到物业电话说我家水管爆了，水已经漏到楼下邻居家了。需要马上回去开门让维修人员处理，不然泡坏地板和邻居的装修，损失就大了。上午请假回来处理，处理完最快也要下午才能来公司。",
          score: 5
        },
        {
          title: "驾驶证到期需要去车管所换证",
          detail: "驾驶证下周一就到期了，之前一直没时间去换，网上预约了今天上午的车管所。交管所周末不上班，只能工作日去办理，不然过期了还得重考科目一，太麻烦了。",
          score: 4
        },
        {
          title: "牙疼得厉害需要去看牙医",
          detail: "右边大牙已经疼了两天了，昨晚疼得一整夜没睡好，吃了布洛芬也没太大作用。今天早上预约了牙科诊所，说是可能是牙髓炎，需要做根管治疗，不敢再拖了。",
          score: 5
        },
        {
          title: "小区临时停水停电需要在家等维修",
          detail: "早上起床发现小区突然断水断电了，物业说是地下管道施工问题。家里鱼缸有热带鱼需要氧气泵，还有冰箱里的东西怕坏，得在家等物业抢修完毕，预计下午恢复。",
          score: 3
        },
        {
          title: "身份证丢了需要去补办",
          detail: "周末出去玩回来发现身份证不见了，翻遍了所有地方都没找到。下周出差要坐飞机，没有身份证根本不行。今天上午请半天假去派出所补办加急的，顺便开个临时身份证明。",
          score: 4
        },
        {
          title: "昨天加班太晚今天身体吃不消",

          score: 4
        },
        {
          title: "空调坏了维修师傅只有今天上午有空",
          detail: "家里的中央空调上周就坏了，维修师傅排期一直很满，好不容易约到今天上午来修。这个师傅在我们片区口碑很好，错过这次又得等两周。三伏天没空调实在受不了。",
          score: 3
        },
        {
          title: "要去银行办理一笔重要的业务",
          detail: "有一笔理财到期了需要去银行柜台办理转存，涉及到金额比较大，线上没法操作必须本人到场。预约了今天上午9点半的号，错过这个时间段后面几天都满了。",
          score: 4
        },
        {
          title: "宠物狗生病了需要带去宠物医院",
          detail: "我家养的柯基从昨晚开始一直呕吐，早上起来精神很差，不吃不喝的。预约了上午10点半的宠物医院，怕是什么肠胃炎或者吞了异物，得尽早去检查。",

        {

          score: 5
        },
        {
          title: "要去社区办理居住证续期",
          detail: "居住证还有两天就过期了，户口不在本地，居住证过期会影响购车资格和小孩上学的事情。社区服务中心只有工作日办公，今天上午请半天假去办理续期。",
          score: 4
        },
        {
          title: "肠胃不舒服可能吃坏东西了",
          detail: "昨晚跟朋友聚餐吃了个街边摊，半夜开始肚子绞痛，跑了好几趟厕所。早上起来还是觉得胃里翻江倒海，浑身没劲。早上请假在家休息，顺便吃点药，下午看情况如果能撑住再来。",
          score: 5

      ],
      absurd: [
        {
          title: "我的猫今天心情不好，需要在家陪伴",

          score: 1
        },
        {
          title: "昨晚梦见老板给我放假了",
          detail: "昨晚做梦梦到老板特别慈祥地拍着我的肩膀说'明天休息一天吧'，我今天早上醒来的那一刻感觉整个人都被治愈了。我觉得这梦太真实了，一定是天意。遵循天命安排，在家等老板发通知。",

        {

        {

        {

          score: 2
        },
        {

          score: 1
        },
        {
          title: "我正在追的剧更新了，停不下来",

          score: 1

        {

          score: 2

        {

          score: 1
        },
        {

          score: 2
        }
      ],
      touching: [

    // ──────────────────────────────────────
    // STATE
    // ──────────────────────────────────────
    let currentCategory = 'serious';
    let currentExcuse = null;
    let usedExcuses = { serious: [], absurd: [], touching: [] };

    // ──────────────────────────────────────
    // DOM ELEMENTS
    // ──────────────────────────────────────
    const card = document.getElementById('card');
    const cardFront = document.getElementById('cardFront');
    const cardBack = document.getElementById('cardBack');
    const excuseTag = document.getElementById('excuseTag');
    const excuseScore = document.getElementById('excuseScore');
    const excuseScoreLabel = document.getElementById('excuseScoreLabel');
    const excuseTitle = document.getElementById('excuseTitle');
    const excuseDetail = document.getElementById('excuseDetail');
    const btnGenerate = document.getElementById('btnGenerate');
    const btnCopy = document.getElementById('btnCopy');
    const btnRegenerate = document.getElementById('btnRegenerate');
    const actions = document.getElementById('actions');
    const shareHint = document.getElementById('shareHint');
    const toast = document.getElementById('toast');

    // ──────────────────────────────────────
    // TAB SWITCHING
    // ──────────────────────────────────────
    document.getElementById('tabs').addEventListener('click', function(e) {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentCategory = tab.dataset.category;
      // Reset card
      card.classList.remove('flip');
      currentExcuse = null;
      actions.style.display = 'none';
      shareHint.style.display = 'none';
      btnGenerate.style.display = '';
      btnCopy.classList.remove('copied');
      btnCopy.textContent = '📋 复制理由';
    });

    // ──────────────────────────────────────
    // GENERATE EXCUSE
    // ──────────────────────────────────────
    function generate() {
      const pool = excuses[currentCategory];
      const used = usedExcuses[currentCategory];

      // If all used, reset
      if (used.length >= pool.length) {
        usedExcuses[currentCategory] = [];
      }

      // Pick a random unused excuse
      const available = pool.filter((_, i) => !usedExcuses[currentCategory].includes(i));
      const randomIndex = Math.floor(Math.random() * available.length);
      const excuse = available[randomIndex];
      const originalIndex = pool.indexOf(excuse);

      usedExcuses[currentCategory].push(originalIndex);
      currentExcuse = excuse;

      // Populate card back
      const categoryLabels = { serious: '正经', absurd: '离谱', touching: '感人' };
      excuseTag.textContent = categoryLabels[currentCategory] || '正经';

      // Stars
      let starsHtml = '';
      for (let i = 1; i <= 5; i++) {
        starsHtml += i <= excuse.score
          ? '<span class="star">⭐</span>'
          : '<span class="star empty">☆</span>';
      }
      excuseScore.innerHTML = starsHtml;
      excuseScoreLabel.textContent = `靠谱指数 ${excuse.score}/5`;

      excuseTitle.textContent = excuse.title;
      excuseDetail.textContent = excuse.detail;

      // Flip card
      card.classList.add('flip');
      actions.style.display = 'flex';
      shareHint.style.display = 'block';
      btnGenerate.style.display = 'none';
      btnCopy.classList.remove('copied');
      btnCopy.textContent = '📋 复制理由';
    }

    // ──────────────────────────────────────
    // COPY EXCUSE
    // ──────────────────────────────────────
    async function copyExcuse() {
      if (!currentExcuse) return;
      const text = `${currentExcuse.title}\n\n${currentExcuse.detail}`;

      try {
        await navigator.clipboard.writeText(text);
        btnCopy.classList.add('copied');
        btnCopy.textContent = '✅ 已复制，快发给老板吧 😏';
        showToast('✅ 已复制，快发给老板吧 😏');

        setTimeout(() => {
          btnCopy.classList.remove('copied');
          btnCopy.textContent = '📋 复制理由';
        }, 3000);
      } catch (err) {
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          btnCopy.classList.add('copied');
          btnCopy.textContent = '✅ 已复制，快发给老板吧 😏';
          showToast('✅ 已复制，快发给老板吧 😏');
          setTimeout(() => {
            btnCopy.classList.remove('copied');
            btnCopy.textContent = '📋 复制理由';
          }, 3000);
        } catch (e) {
          showToast('复制失败，请手动选中文本复制');
        }
        document.body.removeChild(textarea);
      }
    }

    // ──────────────────────────────────────
    // TOAST
    // ──────────────────────────────────────
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // ──────────────────────────────────────
    // KEYBOARD SHORTCUT
    // ──────────────────────────────────────
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !card.classList.contains('flip')) {
        generate();
      }
      if (e.key === ' ' && card.classList.contains('flip')) {
        e.preventDefault();
        generate();
      }
      if ((e.key === 'c' || e.key === 'C') && card.classList.contains('flip') && !e.ctrlKey && !e.metaKey) {
        copyExcuse();
      }
    });
  </script>
